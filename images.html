<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery - Masonry Layout</title>
    <link rel="stylesheet" href="libs/popover.css" />
    <style>
      :root {
        --bg-color: #ffffff;
        --card-bg: #f1f5f9;
        --text-color: #0f172a;
        --accent-color: #0ea5e9;
        --gap: 2px;
        --popover-offset: 10px;
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        overflow-x: hidden;
      }

      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        padding: 8px 20px;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05);
      }

      .header-main {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        min-height: 44px;
      }

      .header-left {
        position: absolute;
        left: 0;
        display: flex;
        align-items: center;
      }

      .header-right {
        position: absolute;
        right: 0;
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .title {
        font-weight: 800;
        font-size: 1rem;
        color: var(--text-color);
        letter-spacing: -0.025em;
        opacity: 0.8;
        white-space: nowrap;
      }

      .nav-links {
        display: flex;
        gap: 12px;
      }

      .nav-links a {
        text-decoration: none;
        color: #64748b;
        font-size: 0.7rem;
        font-weight: 800;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }

      .nav-links a:hover {
        color: var(--accent-color);
      }

      .filters {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
      }

      .filter-group {
        display: flex;
        align-items: center;
        gap: 4px;
        background: #f1f5f9;
        padding: 4px 10px;
        border-radius: 6px;
        transition: background 0.2s ease;
      }

      .filter-group:hover {
        background: #e2e8f0;
      }

      .filter-group label {
        font-size: 0.6rem;
        text-transform: uppercase;
        color: #64748b;
        font-weight: 800;
        cursor: ew-resize;
        user-select: none;
      }

      .filter-group select,
      .filter-group input {
        background: transparent;
        border: none;
        color: var(--text-color);
        font-size: 0.75rem;
        outline: none;
        font-family: inherit;
      }

      .filter-group input {
        width: 45px;
        border-bottom: 1px solid transparent;
        padding: 2px 0;
        text-align: center;
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
      }

      .filter-group input[type="date"] {
        width: auto;
        font-size: 0.7rem;
      }

      .filter-group input:focus {
        border-bottom-color: var(--accent-color);
      }

      .filter-group select {
        cursor: pointer;
        color: var(--accent-color);
        font-weight: 700;
      }

      .unit-select,
      .order-select {
        font-size: 0.65rem !important;
        font-weight: 800 !important;
        color: #64748b !important;
      }

      .reset-btn {
        background: #fee2e2;
        color: #dc2626;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 0.7rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .reset-btn:hover {
        background: #fecaca;
        transform: translateY(-1px);
      }

      .stats-bar {
        font-size: 0.6rem;
        color: #94a3b8;
        font-weight: 600;
      }

      /* Masonry Layout Technique from CSS Play Emulation */
      .masonry {
        margin-top: 65px;
        column-count: 2;
        column-gap: var(--gap);
        width: 100%;
        max-width: 100vw;
        margin-bottom: 2rem;
      }

      @media (min-width: 480px) {
        .masonry {
          column-count: 3;
        }
      }
      @media (min-width: 768px) {
        .masonry {
          column-count: 5;
        }
      }
      @media (min-width: 1024px) {
        .masonry {
          column-count: 8;
        }
      }
      @media (min-width: 1440px) {
        .masonry {
          column-count: 12;
        }
      }
      @media (min-width: 1920px) {
        .masonry {
          column-count: 16;
        }
      }

      .item {
        display: inline-block;
        width: 100%;
        margin-bottom: var(--gap);
        background-image: repeating-conic-gradient(
          #f1f5f9 0% 25%,
          #ffffff 0% 50%
        );
        background-position: 0 0;
        background-size: 20px 20px;
        overflow: hidden;
        transition: transform 0.2s ease;
        cursor: pointer;
        position: relative;
        break-inside: avoid;
      }

      .item:hover {
        z-index: 10;
        transform: scale(1.05);
      }

      .item img {
        width: 100%;
        display: block;
        height: auto;
        object-fit: scale-down;
      }

      .item .info {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 5px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(4px);
        opacity: 0;
        transition: opacity 0.2s ease;
        font-size: 0.6rem;
      }

      .item:hover .info {
        opacity: 1;
      }

      .item .filename {
        font-size: 0.6rem;
        font-weight: 700;
        color: var(--text-color);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 2px;
      }

      .item .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: #475569;
      }

      .badge {
        background: #e0f2fe;
        color: var(--accent-color);
        padding: 1px 4px;
        border-radius: 2px;
        font-weight: 700;
      }

      .date-meta {
        font-size: 0.55rem;
        color: #64748b;
        margin-top: 2px;
        text-align: right;
        font-family: "JetBrains Mono", monospace;
      }

      /* Popover Styles */
      #image-popover[data-popover] {
        border: none;
        border-radius: 12px;
        padding: 24px;
        background: white;
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.3);
        width: max-content;
        max-width: 95vw;
      }

      #image-popover::backdrop {
        background: rgba(0, 0, 0, 0.15);
        backdrop-filter: blur(4px);
      }

      .popover-content {
        display: flex;
        gap: 28px;
        align-items: flex-start;
      }

      .popover-image {
        background-image: repeating-conic-gradient(
          #f1f5f9 0% 25%,
          #ffffff 0% 50%
        );
        background-position: 0 0;
        background-size: 20px 20px;
        border-radius: 8px;
        overflow: hidden;
        flex-shrink: 0;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .popover-image img {
        display: block;
        width: 150px;
        height: 150px;
        object-fit: scale-down;
      }

      .popover-inputs {
        display: flex;
        flex-direction: column;
        gap: 24px;
        flex-grow: 1;
      }

      .popover-row {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .popover-row label {
        font-size: 0.65rem;
        font-weight: 800;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 0.1em;
      }

      .input-group {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      /* Expandable Input Trick */
      .input-wrapper {
        position: relative;
        display: inline-grid;
        flex-grow: 1;
        min-width: 350px;
      }

      .input-mirror {
        grid-area: 1 / 1;
        visibility: hidden;
        white-space: pre;
        padding: 12px 14px;
        font-size: 0.85rem;
        font-family: "JetBrains Mono", monospace;
        border: 1px solid transparent;
      }

      .popover-row input {
        grid-area: 1 / 1;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 0.85rem;
        font-family: "JetBrains Mono", monospace;
        width: 100%;
        box-sizing: border-box;
        outline: none;
        color: var(--text-color);
        transition: all 0.2s ease;
      }

      .popover-row input:focus {
        border-color: var(--accent-color);
        background: white;
        box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
      }

      .copy-btn {
        background: #f1f5f9;
        color: var(--accent-color);
        border: 1px solid #e2e8f0;
        padding: 0 16px;
        height: 44px;
        border-radius: 8px;
        font-size: 0.75rem;
        font-weight: 800;
        cursor: pointer;
        transition: all 0.2s ease;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .copy-btn:hover {
        background: var(--accent-color);
        color: white;
        border-color: var(--accent-color);
        transform: translateY(-1px);
        box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.2);
      }

      .copy-btn:active {
        transform: translateY(0);
      }

      .copy-btn.success {
        background: #22c55e;
        color: white;
        border-color: #22c55e;
      }

      #loader {
        text-align: center;
        padding: 4rem;
        color: #64748b;
        font-size: 1.125rem;
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .empty-state {
        text-align: center;
        padding: 4rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-main">
        <div class="header-left">
          <div class="title">SOPA // Gallery</div>
        </div>
        <div class="filters">
          <div class="filter-group">
            <label>W</label>
            <select id="w-op">
              <option value="any">any</option>
              <option value=">">&gt;</option>
              <option value="<">&lt;</option>
              <option value="=">=</option>
            </select>
            <input type="number" id="w-val" placeholder="px" min="0" />
          </div>
          <div class="filter-group">
            <label>H</label>
            <select id="h-op">
              <option value="any">any</option>
              <option value=">">&gt;</option>
              <option value="<">&lt;</option>
              <option value="=">=</option>
            </select>
            <input type="number" id="h-val" placeholder="px" min="0" />
          </div>
          <div class="filter-group">
            <label>Size</label>
            <select id="s-op">
              <option value="any">any</option>
              <option value=">">&gt;</option>
              <option value="<">&lt;</option>
              <option value="=">=</option>
            </select>
            <input type="number" id="s-val" placeholder="val" min="0" />
            <select id="s-unit" class="unit-select">
              <option value="B">B</option>
              <option value="KB" selected>KB</option>
              <option value="MB">MB</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Date</label>
            <select id="d-op">
              <option value="any">any</option>
              <option value=">">&gt;</option>
              <option value="<">&lt;</option>
              <option value="=">=</option>
            </select>
            <input type="date" id="d-val" />
          </div>
          <div class="filter-group">
            <label>Sort</label>
            <select id="sort-by">
              <option value="none">none</option>
              <option value="width">W</option>
              <option value="height">H</option>
              <option value="size">Size</option>
              <option value="date">Date</option>
            </select>
            <select id="sort-order" class="order-select">
              <option value="asc">Asc</option>
              <option value="desc">Desc</option>
            </select>
          </div>
          <button id="reset-filters" class="reset-btn">Reset</button>
        </div>
        <div class="header-right">
          <nav class="nav-links">
            <a href="index.html">Editor</a>
            <a href="fetch.html">Fetch</a>
            <a href="https://github.com/stopsopa/images" target="_blank" style="margin-left: 8px; opacity: 0.8; display: flex; align-items: center;">
              <img src="https://stopsopa.github.io/images/images/GitHub_Invertocat_White.png" style="height: 20px; filter: invert(1);" alt="GitHub">
            </a>
          </nav>
          <div id="stats-bar" class="stats-bar">
            <span id="count-visible">0</span> / <span id="count-total">0</span>
          </div>
        </div>
      </div>
    </header>

    <div id="loader">Discovering images...</div>
    <div class="masonry" id="gallery"></div>

    <div id="image-popover" popover data-popover class="center">
      <div class="popover-content">
        <div class="popover-image">
          <img id="pop-img" src="" alt="" />
        </div>
        <div class="popover-inputs">
          <div class="popover-row">
            <label>Absolute Path</label>
            <div class="input-group">
              <div class="input-wrapper">
                <div id="abs-mirror" class="input-mirror"></div>
                <input type="text" id="pop-abs-path" readonly />
              </div>
              <button class="copy-btn" data-target="pop-abs-path">Copy</button>
            </div>
          </div>
          <div class="popover-row">
            <label>Markdown Link</label>
            <div class="input-group">
              <div class="input-wrapper">
                <div id="md-mirror" class="input-mirror"></div>
                <input type="text" id="pop-md-link" readonly />
              </div>
              <button class="copy-btn" data-target="pop-md-link">Copy</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import toHumanReadable from "./libs/toHumanReadable.js";

      let allImages = [];

      async function streamToString(stream) {
        const reader = stream.getReader();
        const textDecoder = new TextDecoder();
        let result = "";

        async function read() {
          const { done, value } = await reader.read();

          if (done) {
            return result;
          }

          result += textDecoder.decode(value, { stream: true });
          return read();
        }

        return await read();
      }

      function renderGallery(images) {
        const gallery = document.getElementById("gallery");
        gallery.innerHTML = "";

        if (images.length === 0) {
          gallery.innerHTML = '<div class="empty-state"></div>';
          document.getElementById("count-visible").textContent = "0";
          return;
        }

        for (const img of images) {
          const item = document.createElement("div");
          item.className = "item";

          const filename = img.path.split("/").pop();

          item.innerHTML = `
                    <img src="${img.path}" alt="${filename}" loading="lazy">
                    <div class="info">
                        <div class="filename">${filename}</div>
                        <div class="meta">
                            <span>${img.width} × ${img.height} px</span>
                            <span class="badge">${toHumanReadable(img.size)}</span>
                        </div>
                        <div class="date-meta">${img.date ? img.date.split("T")[0] : ""}</div>
                    </div>
                `;

          item.addEventListener("click", (e) => {
            const popover = document.getElementById("image-popover");
            const absInput = document.getElementById("pop-abs-path");
            const mdInput = document.getElementById("pop-md-link");
            const absMirror = document.getElementById("abs-mirror");
            const mdMirror = document.getElementById("md-mirror");
            const popImg = document.getElementById("pop-img");

            const absPath = new URL(img.path, window.location.href).href;
            const mdLink = `![${filename}](${absPath})`;

            absInput.value = absPath;
            absMirror.textContent = absPath;

            mdInput.value = mdLink;
            mdMirror.textContent = mdLink;

            popImg.src = img.path;
            popImg.alt = filename;

            // Chromium 125+ Anchor Positioning
            item.style.anchorName = "--active-item";
            popover.style.positionAnchor = "--active-item";

            popover.showPopover();

            // Auto-select text on click
            [absInput, mdInput].forEach((input) => {
              input.onclick = () => input.select();
            });
          });

          gallery.appendChild(item);
        }

        document.getElementById("count-visible").textContent = images.length;
      }

      // Setup Copy Buttons
      document.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const targetId = btn.getAttribute("data-target");
          const input = document.getElementById(targetId);

          try {
            await navigator.clipboard.writeText(input.value);
            const originalText = btn.textContent;
            btn.textContent = "Copied!";
            btn.classList.add("success");

            setTimeout(() => {
              btn.textContent = originalText;
              btn.classList.remove("success");
            }, 2000);
          } catch (err) {
            console.error("Failed to copy: ", err);
          }
        });
      });

      function applyFilters() {
        const wOp = document.getElementById("w-op").value;
        const wVal = parseInt(document.getElementById("w-val").value);
        const hOp = document.getElementById("h-op").value;
        const hVal = parseInt(document.getElementById("h-val").value);
        const sOp = document.getElementById("s-op").value;
        const sVal = parseFloat(document.getElementById("s-val").value);
        const sUnit = document.getElementById("s-unit").value;
        const dOp = document.getElementById("d-op").value;
        const dVal = document.getElementById("d-val").value;
        const sortBy = document.getElementById("sort-by").value;
        const sortOrder = document.getElementById("sort-order").value;

        let filtered = allImages.filter((img) => {
          let match = true;

          // Width filter
          if (wOp !== "any" && !isNaN(wVal)) {
            if (wOp === ">" && !(img.width > wVal)) match = false;
            if (wOp === "<" && !(img.width < wVal)) match = false;
            if (wOp === "=" && !(img.width === wVal)) match = false;
          }

          // Height filter
          if (hOp !== "any" && !isNaN(hVal)) {
            if (hOp === ">" && !(img.height > hVal)) match = false;
            if (hOp === "<" && !(img.height < hVal)) match = false;
            if (hOp === "=" && !(img.height === hVal)) match = false;
          }

          // Size filter
          if (sOp !== "any" && !isNaN(sVal)) {
            let divisor = 1;
            if (sUnit === "KB") divisor = 1024;
            if (sUnit === "MB") divisor = 1024 * 1024;
            const imgVal = img.size / divisor;
            if (sOp === ">" && !(imgVal > sVal)) match = false;
            if (sOp === "<" && !(imgVal < sVal)) match = false;
            if (sOp === "=") {
              if (sUnit === "B") {
                if (img.size !== sVal) match = false;
              } else {
                if (Math.round(imgVal * 100) / 100 !== sVal) match = false;
              }
            }
          }

          // Date filter
          if (dOp !== "any" && dVal) {
            const imgDatePart = img.date ? img.date.split("T")[0] : "";
            if (dOp === ">" && !(imgDatePart > dVal)) match = false;
            if (dOp === "<" && !(imgDatePart < dVal)) match = false;
            if (dOp === "=" && !(imgDatePart === dVal)) match = false;
          }

          return match;
        });

        if (sortBy !== "none") {
          filtered.sort((a, b) => {
            let valA = a[sortBy];
            let valB = b[sortBy];

            if (sortBy === "date") {
              valA = valA ? new Date(valA).getTime() : 0;
              valB = valB ? new Date(valB).getTime() : 0;
            }

            if (valA < valB) return sortOrder === "asc" ? -1 : 1;
            if (valA > valB) return sortOrder === "asc" ? 1 : -1;
            return 0;
          });
        }

        renderGallery(filtered);
      }

      // Photoshop-style Scrubbable Inputs
      function setupScrubbableInputs() {
        const numberInputs = document.querySelectorAll('input[type="number"]');

        numberInputs.forEach((input) => {
          const label = input.parentElement.querySelector("label");

          let isDragging = false;
          let startX = 0;
          let startValue = 0;

          const onMouseDown = (e) => {
            startX = e.clientX;
            startValue = parseFloat(input.value) || 0;
            window.addEventListener("mousemove", onMouseMove);
            window.addEventListener("mouseup", onMouseUp);
          };

          const onMouseMove = (e) => {
            const dx = e.clientX - startX;

            if (!isDragging && Math.abs(dx) > 2) {
              isDragging = true;
              document.body.style.cursor = "ew-resize";
              document.body.style.userSelect = "none";
            }

            if (isDragging) {
              e.preventDefault();
              const delta = Math.round(dx / 2);
              let newValue = startValue + delta;

              // Ensure no negative values unless explicitly allowed by min attribute (but user said "Don't allow negative values")
              const min = input.hasAttribute("min") ? Math.max(0, parseFloat(input.min)) : 0;
              newValue = Math.max(min, newValue);

              if (input.hasAttribute("max"))
                newValue = Math.min(parseFloat(input.max), newValue);

              if (input.value != newValue) {
                input.value = newValue;
                input.dispatchEvent(new Event("input"));
              }
            }
          };

          const onMouseUp = () => {
            if (isDragging) {
              isDragging = false;
              document.body.style.cursor = "";
              document.body.style.userSelect = "";
            }
            window.removeEventListener("mousemove", onMouseMove);
            window.removeEventListener("mouseup", onMouseUp);
          };

          if (label) {
            label.style.cursor = "ew-resize";
            label.title = "Drag left/right to adjust value";
            label.addEventListener("mousedown", (e) => {
              e.preventDefault();
              onMouseDown(e);
            });
          }

          input.title = "Drag left/right to adjust value";
          input.addEventListener("mousedown", (e) => {
            onMouseDown(e);
          });
          input.addEventListener("click", () => input.select());
        });
      }

      async function loadImages() {
        const gallery = document.getElementById("gallery");
        const loader = document.getElementById("loader");

        try {
          const response = await fetch(`process.json?v=${Date.now()}`);
          if (!response.ok) throw new Error(`Failed to fetch process.json`);
          let body = response.body;
          if (
            Object.prototype.toString.call(body) === "[object ReadableStream]"
          ) {
            body = await streamToString(body);
          }
          const lines = body.split("\n").filter((line) => line.trim());
          loader.style.display = "none";
          allImages = lines.map((line) => {
            const [path, size, width, height, date] = JSON.parse(line);
            return { path, size, width, height, date };
          });
          document.getElementById("count-total").textContent = allImages.length;
          renderGallery(allImages);

          // Setup filter and sort listeners
          [
            "w-op",
            "w-val",
            "h-op",
            "h-val",
            "s-op",
            "s-val",
            "s-unit",
            "d-op",
            "d-val",
            "sort-by",
            "sort-order",
          ].forEach((id) => {
            const el = document.getElementById(id);
            if (!el) return;
            el.addEventListener("input", applyFilters);
            if (
              id.endsWith("-op") ||
              id.endsWith("-unit") ||
              id.startsWith("sort-")
            ) {
              el.addEventListener("change", applyFilters);
            }
          });

          document
            .getElementById("reset-filters")
            .addEventListener("click", () => {
              document.getElementById("w-op").value = "any";
              document.getElementById("w-val").value = "";
              document.getElementById("h-op").value = "any";
              document.getElementById("h-val").value = "";
              document.getElementById("s-op").value = "any";
              document.getElementById("s-val").value = "";
              document.getElementById("s-unit").value = "KB";
              document.getElementById("d-op").value = "any";
              document.getElementById("d-val").value = "";
              document.getElementById("sort-by").value = "none";
              document.getElementById("sort-order").value = "asc";
              applyFilters();
            });

          setupScrubbableInputs();
        } catch (error) {
          console.error("Error loading gallery:", error);
          loader.style.animation = "none";
          loader.innerHTML = `<div style="color: #ef4444;">Failed to load assets: ${error.message}</div>`;
        }
      }

      loadImages();
    </script>
  </body>
</html>
