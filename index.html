<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SOPA Images | Premium Image Processor</title>
    <meta
      name="description"
      content="A premium, client-side image processor for cropping, resizing, and exporting to WebP."
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Cropper.js CSS -->
    <link rel="stylesheet" href="./libs/cropper.min.css" />

    <style>
      :root {
        --bg-color: #0a0a0c;
        --panel-bg: rgba(20, 20, 25, 0.7);
        --border-color: rgba(255, 255, 255, 0.1);
        --accent-color: #3b82f6;
        --accent-hover: #2563eb;
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --glass-bg: rgba(255, 255, 255, 0.03);
        --glass-blur: blur(12px);
        --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        --radius: 12px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        overflow-x: hidden;
        background-image:
          radial-gradient(
            circle at 20% 20%,
            rgba(59, 130, 246, 0.05) 0%,
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(59, 130, 246, 0.05) 0%,
            transparent 40%
          );
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-color);
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #444;
      }

      header {
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        background: rgba(10, 10, 12, 0.8);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .header-links {
        display: flex;
        gap: 1.5rem;
        align-items: center;
      }

      .header-links a {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        transition: color 0.3s ease;
      }

      .header-links a:hover {
        color: var(--text-primary);
      }

      .logo {
        font-weight: 800;
        font-size: 1.5rem;
        letter-spacing: -0.05em;
        background: linear-gradient(135deg, #fff 0%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .step-indicator {
        display: flex;
        gap: 1.5rem;
      }

      .step {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: color 0.3s ease;
      }

      .step.active {
        color: var(--accent-color);
        font-weight: 600;
      }

      .step.active::before {
        content: "";
        width: 6px;
        height: 6px;
        background: var(--accent-color);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--accent-color);
      }

      main {
        display: grid;
        grid-template-columns: 1fr 400px;
        gap: 2rem;
        padding: 2rem;
        flex-grow: 1;
        max-width: 1600px;
        margin: 0 auto;
        width: 100%;
      }

      .panel {
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: var(--radius);
        backdrop-filter: var(--glass-blur);
        box-shadow: var(--shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .panel-header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--border-color);
        font-weight: 600;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.02);
      }

      .panel-content {
        padding: 1.5rem;
        flex-grow: 1;
      }

      /* Dropzone & Input */
      .input-stage {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        height: 100%;
        justify-content: center;
        align-items: center;
        text-align: center;
      }

      .drop-zone {
        width: 100%;
        max-width: 500px;
        aspect-ratio: 16/9;
        border: 2px dashed var(--border-color);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        background: var(--glass-bg);
      }

      .drop-zone:hover,
      .drop-zone.dragover {
        border-color: var(--accent-color);
        background: rgba(59, 130, 246, 0.05);
        transform: translateY(-2px);
      }

      .drop-zone i {
        font-size: 2.5rem;
        color: var(--text-secondary);
      }

      .url-input-group {
        display: flex;
        width: 100%;
        max-width: 500px;
        gap: 0.5rem;
      }

      input[type="text"],
      input[type="number"] {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 0.75rem 1rem;
        border-radius: 8px;
        outline: none;
        transition: border-color 0.3s ease;
        font-family: inherit;
      }

      input[type="text"]:focus,
      input[type="number"]:focus {
        border-color: var(--accent-color);
      }

      @keyframes pulse-border {
        0% { border-color: var(--border-color); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        50% { border-color: var(--accent-color); box-shadow: 0 0 8px 0 rgba(59, 130, 246, 0.3); }
        100% { border-color: var(--border-color); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
      }

      .needs-attention {
        animation: pulse-border 2s infinite;
        border-color: var(--accent-color) !important;
      }

      button {
        background: var(--accent-color);
        color: white;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        white-space: nowrap;
      }

      button:hover {
        background: var(--accent-hover);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      }

      button.secondary {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
      }

      button.secondary:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      /* Cropper Area */
      .crop-stage {
        display: none;
        flex-direction: column;
        gap: 1rem;
        height: 100%;
      }

      .cropper-container-wrapper {
        flex-grow: 1;
        min-height: 400px;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        position: relative;
      }

      .cropper-container-wrapper.bg-bright {
        background-color: #fff !important;
        background-image: linear-gradient(45deg, #999 25%, transparent 25%),
          linear-gradient(-45deg, #999 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #999 75%),
          linear-gradient(-45deg, transparent 75%, #999 75%) !important;
        background-size: 20px 20px !important;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0px !important;
      }
      .cropper-container-wrapper.bg-grid {
        background-color: #aaa !important;
        background-image: linear-gradient(45deg, #444 25%, transparent 25%),
          linear-gradient(-45deg, #444 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #444 75%),
          linear-gradient(-45deg, transparent 75%, #444 75%) !important;
        background-size: 20px 20px !important;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0px !important;
      }
      .cropper-container-wrapper.bg-dark {
        background-color: #555 !important;
        background-image: linear-gradient(45deg, #000 25%, transparent 25%),
          linear-gradient(-45deg, #000 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #000 75%),
          linear-gradient(-45deg, transparent 75%, #000 75%) !important;
        background-size: 20px 20px !important;
        background-position: 0 0, 0 10px, 10px -10px, -10px 0px !important;
      }

      #image-to-crop {
        max-width: 100%;
        display: block;
      }

      /* Controls Area */
      .controls {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
        margin-top: 1rem;
        background: rgba(255, 255, 255, 0.02);
        padding: 1rem;
        border-radius: 8px;
        border: 1px solid var(--border-color);
      }

      .control-item {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .control-item label {
        font-size: 0.75rem;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .control-item input {
        width: 100%;
        font-family: "JetBrains Mono", monospace;
      }

      /* Preview Panel */
      .preview-container {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        height: 100%;
      }

      .preview-box {
        width: 100%;
        aspect-ratio: 1/1;
        background: #000;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.25);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #preview-img {
        max-width: 100%;
        max-height: 100%;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        background: repeating-conic-gradient(
            rgba(255, 255, 255, 0.1) 0% 25%,
            transparent 0% 50%
          )
          50% / 20px 20px;
        background-color: #111;
      }

      .stats {
        background: rgba(0, 0, 0, 0.3);
        border-radius: 8px;
        padding: 1rem;
        border: 1px solid var(--border-color);
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 0.5rem;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
      }

      .stat-row:last-child {
        margin-bottom: 0;
      }
      .stat-label {
        color: var(--text-secondary);
      }
      .stat-value {
        color: var(--accent-color);
        font-weight: 600;
      }

      .actions {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: auto;
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fade-in {
        animation: fadeIn 0.4s ease forwards;
      }

      /* Background Selector */
      .bg-selector {
        display: flex;
        gap: 0.5rem;
        background: rgba(255, 255, 255, 0.05);
        padding: 2px;
        border-radius: 6px;
        border: 1px solid var(--border-color);
      }
      .bg-option {
        position: relative;
        cursor: pointer;
      }
      .bg-option input {
        position: absolute;
        opacity: 0;
        cursor: pointer;
      }
      .bg-option .dot {
        width: 18px;
        height: 18px;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        display: block;
        transition: all 0.2s ease;
      }
      .bg-option.bright .dot {
        background-color: #fff;
        background-image: linear-gradient(45deg, #999 25%, transparent 25%),
          linear-gradient(-45deg, #999 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #999 75%),
          linear-gradient(-45deg, transparent 75%, #999 75%);
        background-size: 6px 6px;
        background-position: 0 0, 0 3px, 3px -3px, -3px 0px;
      }
      .bg-option.grid .dot {
        background-color: #aaa;
        background-image: linear-gradient(45deg, #444 25%, transparent 25%),
          linear-gradient(-45deg, #444 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #444 75%),
          linear-gradient(-45deg, transparent 75%, #444 75%);
        background-size: 6px 6px;
        background-position: 0 0, 0 3px, 3px -3px, -3px 0px;
      }
      .bg-option.dark .dot {
        background-color: #555;
        background-image: linear-gradient(45deg, #000 25%, transparent 25%),
          linear-gradient(-45deg, #000 25%, transparent 25%),
          linear-gradient(45deg, transparent 75%, #000 75%),
          linear-gradient(-45deg, transparent 75%, #000 75%);
        background-size: 6px 6px;
        background-position: 0 0, 0 3px, 3px -3px, -3px 0px;
      }
      .bg-option input:checked + .dot {
        outline: 2px solid var(--accent-color);
        outline-offset: 1px;
        transform: scale(0.9);
      }

      /* Utils */
      .hidden {
        display: none !important;
      }

      /* Customizing Cropper.js */
      .cropper-view-box,
      .cropper-face {
        border-radius: 0;
      }
      .cropper-line {
        background-color: var(--accent-color);
      }
      .cropper-point {
        background-color: var(--accent-color);
        width: 8px;
        height: 8px;
      }
      .cropper-container,
      .cropper-bg {
        background-image: none !important;
        background-color: transparent !important;
      }

      /* Toast / Notification */
      #toast {
        position: fixed;
        bottom: 2rem;
        left: 50%;
        transform: translateX(-50%);
        background: #ef4444;
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 50px;
        font-size: 0.9rem;
        font-weight: 600;
        z-index: 1000;
        box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        display: none;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">SOPA // IMAGES</div>
      <div class="header-links">
        <a href="images.html">Gallery</a>
        <a
          href="https://github.com/stopsopa/images/upload/main/images"
          target="_blank"
          >Upload</a
        >
        <a href="https://github.com/stopsopa/images" target="_blank" style="opacity: 0.8; display: flex; align-items: center;">
          <img src="https://stopsopa.github.io/images/images/GitHub_Invertocat_White.png" style="height: 20px;" alt="GitHub">
        </a>
      </div>
    </header>

    <main>
      <!-- Left Panel: Source & Editing -->
      <section class="panel">
        <div class="panel-header">
          <span id="panel-title">Source Image</span>
          <div class="header-actions">
            <div class="bg-selector" title="Change background">
              <label class="bg-option bright" title="Bright Gray">
                <input type="radio" name="bg-type" value="bg-bright" />
                <span class="dot"></span>
              </label>
              <label class="bg-option grid" title="Photoshop Grid">
                <input type="radio" name="bg-type" value="bg-grid" checked />
                <span class="dot"></span>
              </label>
              <label class="bg-option dark" title="Dark Gray">
                <input type="radio" name="bg-type" value="bg-dark" />
                <span class="dot"></span>
              </label>
            </div>
          </div>
        </div>

        <div class="panel-content">
          <!-- Step 1: Input -->
          <div id="input-stage" class="input-stage fade-in">
            <div class="drop-zone" id="drop-zone">
              <i>📂</i>
              <div>
                <p
                  style="
                    font-size: 1.1rem;
                    font-weight: 600;
                    margin-bottom: 0.5rem;
                  "
                >
                  Drop image here
                </p>
                <p style="color: var(--text-secondary)">
                  or click to browse, or paste (Ctrl+V)
                </p>
              </div>
              <input
                type="file"
                id="file-input"
                accept="image/*"
                class="hidden"
              />
            </div>

            <div style="color: var(--text-secondary)">— or —</div>

            <div class="url-input-group">
              <input
                type="text"
                id="url-input"
                placeholder="Paste image URL..."
                style="flex-grow: 1"
              />
              <button id="url-load-btn">Load URL</button>
            </div>
          </div>

          <!-- Step 2: Crop/Resize -->
          <div id="crop-stage" class="crop-stage">
            <div class="cropper-container-wrapper bg-grid">
              <img id="image-to-crop" src="" alt="Source" />
            </div>

            <div class="controls">
              <div class="control-item">
                <label>Crop Width (px)</label>
                <input type="number" id="crop-width" value="1200" />
              </div>
              <div class="control-item">
                <label>Crop Height (px)</label>
                <input type="number" id="crop-height" value="800" />
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Right Panel: Result & Export -->
      <section class="panel">
        <div
          class="panel-header"
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <span>Preview & Export</span>
          <button
            id="float-preview-btn"
            class="secondary"
            style="
              padding: 0.25rem 0.75rem;
              font-size: 0.8rem;
              border-radius: 4px;
              margin-left: auto;
            "
          >
            Float
          </button>
        </div>
        <div class="panel-content">
          <div class="preview-container">
            <div class="preview-box">
              <img
                id="preview-img"
                src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                alt="Preview"
                draggable="false"
                style="-webkit-user-drag: none; pointer-events: none"
              />
              <div
                id="preview-placeholder"
                style="color: var(--text-secondary); text-align: center"
              >
                <p>No image loaded</p>
              </div>
            </div>

            <div
              class="controls pad-cross-layout"
              style="
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                gap: 0.5rem;
                margin-top: 0;
                background: rgba(255, 255, 255, 0.02);
                border: 1px solid var(--border-color);
                padding: 1rem;
                margin-bottom: 1rem;
                border-radius: 8px;
                align-items: end;
              "
            >
              <div class="control-item" style="align-items: center">
                <label style="font-size: 0.65rem">Restrict</label>
                <input type="checkbox" id="restrict-crop" style="width: auto" />
              </div>
              <div class="control-item" style="align-items: center">
                <label>Top</label>
                <input
                  type="number"
                  id="pad-top"
                  value="0"
                  style="text-align: center"
                />
              </div>
              <div></div>

              <div class="control-item" style="align-items: center">
                <label>Left</label>
                <input
                  type="number"
                  id="pad-left"
                  value="0"
                  style="text-align: center"
                />
              </div>
              <div
                style="
                  font-size: 0.75rem;
                  color: var(--text-secondary);
                  text-transform: uppercase;
                  text-align: center;
                  margin-bottom: 10px;
                "
              >
                Add<br />Space
              </div>
              <div class="control-item" style="align-items: center">
                <label>Right</label>
                <input
                  type="number"
                  id="pad-right"
                  value="0"
                  style="text-align: center"
                />
              </div>

              <div></div>
              <div class="control-item" style="align-items: center">
                <label>Bottom</label>
                <input
                  type="number"
                  id="pad-bottom"
                  value="0"
                  style="text-align: center"
                />
              </div>
              <div></div>
            </div>

            <div
              class="controls"
              style="
                grid-template-columns: 1fr 1fr;
                margin-top: 0;
                background: none;
                border: none;
                padding: 0;
              "
            >
              <div class="control-item">
                <label>Download Width</label>
                <input type="number" id="download-width" value="1200" />
              </div>
              <div class="control-item">
                <label>Download Height</label>
                <input type="number" id="download-height" value="800" />
              </div>
              <div
                class="control-item"
                style="
                  grid-column: span 2;
                  display: flex;
                  flex-direction: row;
                  align-items: center;
                  justify-content: space-between;
                "
              >
                <div style="flex: 1">
                  <label>Image Quality</label>
                  <input
                    type="number"
                    id="download-quality"
                    value="85"
                    min="1"
                    max="100"
                  />
                </div>
                <label
                  style="
                    display: flex;
                    align-items: center;
                    gap: 0.5rem;
                    cursor: pointer;
                    text-transform: none;
                    margin-left: 1rem;
                    margin-top: 1rem;
                  "
                >
                  <input
                    type="checkbox"
                    id="download-lock"
                    checked
                    style="width: auto"
                  />
                  Keep Ratio
                </label>
              </div>
            </div>

            <div class="stats">
              <div class="stat-row">
                <span class="stat-label">Source:</span>
                <span class="stat-value" id="stat-source-size">-</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Crop:</span>
                <span class="stat-value" id="stat-crop-area">-</span>
              </div>
              <div class="stat-row">
                <span class="stat-label">Est. File Size:</span>
                <span class="stat-value" id="stat-file-size">-</span>
              </div>
            </div>

            <div
              class="control-item"
              style="margin-top: 1.5rem; margin-bottom: -0.5rem"
            >
              <label>Output Filename</label>
              <input
                type="text"
                id="filename-input"
                value="image_1200x800q85"
                style="
                  width: 100%;
                  font-family: var(--font-mono);
                  font-size: 0.9rem;
                "
              />
            </div>

            <div
              class="format-selection"
              style="
                display: flex;
                gap: 1.5rem;
                margin-top: 1.5rem;
                justify-content: center;
                padding: 1rem;
                background: rgba(255, 255, 255, 0.02);
                border-radius: 8px;
                border: 1px solid var(--border-color);
              "
            >
              <label
                style="
                  display: flex;
                  align-items: center;
                  gap: 0.5rem;
                  cursor: pointer;
                  text-transform: none;
                  font-weight: 600;
                "
              >
